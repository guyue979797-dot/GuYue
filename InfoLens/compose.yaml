services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INFOLENS_ENV: production
      INFOLENS_OUTPUT_ROOT: /data/output
      INFOLENS_X_ACCEL_ENABLED: "true"
    expose:
      - "8000"
    volumes:
      - infolens_output:/data/output
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - infolens_output:/data/output:ro
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://127.0.0.1:8080/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  wecom-bot:
    build:
      context: .
    profiles:
      - wecom
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INFOLENS_OUTPUT_ROOT: /data/output
    command:
      - python
      - -m
      - infolens.wecom_ws
    volumes:
      - infolens_output:/data/output

  maintenance:
    build:
      context: .
    profiles:
      - maintenance
    env_file:
      - .env
    environment:
      INFOLENS_OUTPUT_ROOT: /data/output
      INFOLENS_BACKUP_ROOT: /data/backups
    entrypoint:
      - python
      - -m
      - infolens.maintenance
    command:
      - thumbnails
    volumes:
      - infolens_output:/data/output
      - infolens_backups:/data/backups

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    environment:
      INFOLENS_DOMAIN: ${INFOLENS_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  infolens_output:
  infolens_backups:
  caddy_data:
  caddy_config:
