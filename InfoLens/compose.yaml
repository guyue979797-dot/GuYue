services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INFOLENS_ENV: production
      INFOLENS_OUTPUT_ROOT: /data/output
    expose:
      - "8000"
    volumes:
      - infolens_output:/data/output
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  wecom-bot:
    build:
      context: .
    profiles:
      - wecom
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INFOLENS_OUTPUT_ROOT: /data/output
    command:
      - python
      - -m
      - infolens.wecom_ws
    volumes:
      - infolens_output:/data/output

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      INFOLENS_DOMAIN: ${INFOLENS_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  infolens_output:
  caddy_data:
  caddy_config:
