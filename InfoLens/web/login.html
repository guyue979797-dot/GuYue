<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · InfoLens</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh; margin: 0; display: grid; place-items: center; color: #f5f5f7;
      background: radial-gradient(ellipse 70% 55% at 50% -5%, #172950 0, transparent 70%), #050609;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: min(420px, calc(100% - 32px)); padding: 34px; border: 1px solid rgba(255,255,255,.14);
      border-radius: 28px; background: rgba(24,27,34,.76); box-shadow: 0 32px 100px rgba(0,0,0,.5);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
    }
    .mark {
      width: 42px; height: 42px; margin-bottom: 28px; display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,.16); border-radius: 13px;
      background: linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.04));
    }
    .mark::before { content: ""; width: 14px; height: 14px; border: 2px solid #a8d7ff; border-radius: 50%; box-shadow: 5px 0 15px #5da8ff; }
    h1 { margin: 0; font-size: 30px; letter-spacing: -.045em; }
    p { margin: 9px 0 28px; color: #8d8f98; font-size: 14px; line-height: 1.6; }
    label { display: block; margin: 0 0 8px 3px; color: #b9bac0; font-size: 12px; }
    input {
      width: 100%; height: 52px; margin-bottom: 16px; padding: 0 15px; color: #fff;
      border: 1px solid rgba(255,255,255,.1); border-radius: 15px; outline: none;
      background: rgba(0,0,0,.3); font-size: 14px;
    }
    input:focus { border-color: rgba(93,168,255,.65); box-shadow: 0 0 0 4px rgba(93,168,255,.1); }
    button {
      width: 100%; height: 52px; margin-top: 6px; border: 0; border-radius: 15px; cursor: pointer;
      color: #07101d; background: linear-gradient(135deg,#f7fbff,#aacfff 60%,#a5b8ff);
      font-size: 14px; font-weight: 700; box-shadow: 0 14px 35px rgba(79,130,255,.22);
    }
    .error { min-height: 20px; margin: -3px 0 9px; color: #ff827c; font-size: 12px; }
    footer { margin-top: 24px; color: #666872; text-align: center; font-size: 11px; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <div class="mark"></div>
    <h1>欢迎回来</h1>
    <p>登录 InfoLens，继续处理团队的现场影像。</p>
    <div class="error">{{ERROR}}</div>
    <label for="username">账号</label>
    <input id="username" name="username" autocomplete="username" required autofocus>
    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">安全登录</button>
    <footer>InfoLens · Protected workspace</footer>
  </form>
</body>
</html>
