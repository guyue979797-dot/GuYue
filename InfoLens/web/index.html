<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>雪花CRM拜访照片提取</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --surface: rgba(18, 18, 18, .92);
      --surface-strong: rgba(24, 24, 24, .96);
      --line: rgba(255, 255, 255, .1);
      --line-bright: rgba(255, 255, 255, .18);
      --text: #f5f5f7;
      --muted: #9898a2;
      --blue: #e8e8ea;
      --cyan: #e8e8ea;
      --violet: #b8b8bd;
      --success: #ededee;
      --danger: #ff7b76;
      --shadow: 0 32px 100px rgba(0, 0, 0, .48);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(ellipse 60% 42% at 50% -8%, rgba(255, 255, 255, .08), transparent 72%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .38;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.14'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }
    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 0 0 100px;
      position: relative;
    }
    .topbar {
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }
    .brand {
      display: inline-flex;
      align-items: center;
    }
    .brand-logo {
      display: block;
      width: 104px;
      height: auto;
      filter: grayscale(1) brightness(2.5);
      opacity: .92;
    }
    .privacy {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #b7b7c0;
      font-size: 12px;
    }
    .privacy::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(255,255,255,.35);
    }
    .account { display: flex; align-items: center; gap: 14px; }
    .logout {
      color: #777984;
      font-size: 11px;
      text-decoration: none;
      transition: color .2s;
    }
    .logout:hover { color: #d7d7dc; }
    .panel {
      position: relative;
      max-width: 930px;
      margin: 54px auto 0;
      padding: 28px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(24,24,24,.96), rgba(11,11,11,.94));
      border: 1px solid var(--line-bright);
      border-radius: 28px;
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.08);
      backdrop-filter: blur(28px) saturate(135%);
      -webkit-backdrop-filter: blur(28px) saturate(135%);
    }
    .panel::before {
      content: "";
      position: absolute;
      left: 14%;
      right: 14%;
      top: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.48), transparent);
    }
    .panel-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }
    .panel-title { margin: 0 0 5px; font-size: 16px; font-weight: 650; letter-spacing: -.02em; }
    .panel-note { margin: 0; color: var(--muted); font-size: 12px; }
    .mode-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      max-width: 520px;
      margin: 0 auto 24px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(4, 5, 8, .55);
    }
    .mode-tab {
      min-width: 0;
      height: 38px;
      padding: 0 14px;
      color: #858691;
      border-radius: 10px;
      background: transparent;
      box-shadow: none;
      font-size: 12px;
      font-weight: 620;
    }
    .mode-tab::after { content: ""; }
    .mode-tab:hover { color: #d9d9df; background: rgba(255,255,255,.04); box-shadow: none; transform: none; }
    .mode-tab.active {
      color: #111;
      background: #f0f0f2;
      box-shadow: inset 0 1px rgba(255,255,255,.11), 0 8px 20px rgba(0,0,0,.2);
    }
    .mode-panel[hidden] { display: none; }
    .private-chip {
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      color: #b9b9bd;
      background: rgba(255,255,255,.05);
      font: 600 10px/1 -apple-system, sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    label { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    input {
      width: 100%;
      min-width: 0;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 17px;
      padding: 0 18px;
      color: var(--text);
      background: rgba(4, 5, 8, .62);
      outline: none;
      font-size: 14px;
      box-shadow: inset 0 1px 8px rgba(0,0,0,.35);
      transition: border-color .25s, box-shadow .25s, background .25s;
    }
    input::placeholder { color: #6f7079; }
    input:focus {
      border-color: rgba(255,255,255,.55);
      background: rgba(7,9,14,.8);
      box-shadow: 0 0 0 4px rgba(255,255,255,.07), inset 0 1px 8px rgba(0,0,0,.3);
    }
    button {
      min-width: 138px;
      height: 58px;
      border: 0;
      border-radius: 17px;
      padding: 0 20px;
      color: #0a0a0a;
      background: linear-gradient(135deg, #fff 0%, #e7e7e9 100%);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -.01em;
      cursor: pointer;
      box-shadow: inset 0 1px rgba(255,255,255,.8), 0 12px 34px rgba(0,0,0,.32);
      transition: transform .2s, filter .2s, box-shadow .2s;
    }
    button::after { content: " ↗"; font-size: 13px; }
    button:hover {
      filter: brightness(1.07);
      transform: translateY(-1px);
      box-shadow: inset 0 1px rgba(255,255,255,.9), 0 16px 42px rgba(0,0,0,.42);
    }
    button:active { transform: scale(.985); }
    button:disabled { cursor: wait; opacity: .55; transform: none; }
    .status {
      min-height: 20px;
      margin: 14px 3px 0;
      color: #777982;
      font-size: 12px;
    }
    .status:empty { display: none; }
    .status.error { color: var(--danger); }
    .upload-zone {
      position: relative;
      width: 100%;
      height: auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 18px;
      overflow: visible;
      clip: auto;
      color: inherit;
      border: 1px dashed rgba(255,255,255,.24);
      border-radius: 18px;
      background: rgba(4,5,8,.48);
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .2s;
    }
    .upload-zone:hover, .upload-zone.dragging {
      border-color: rgba(255,255,255,.55);
      background: rgba(255,255,255,.045);
      transform: translateY(-1px);
    }
    .upload-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      color: #e3e3e5;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 13px;
      background: rgba(255,255,255,.07);
      font-size: 20px;
    }
    .upload-copy { min-width: 0; }
    .upload-copy strong { display: block; margin-bottom: 0; font-size: 13px; }
    .upload-copy small { display: block; color: var(--muted); font-size: 11px; }
    .file-name {
      max-width: 240px;
      overflow: hidden;
      color: #d4d4d7;
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .batch-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 12px;
    }
    .batch-actions button { height: 48px; min-width: 152px; border-radius: 15px; }
    .batch-progress {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 15px;
      background: rgba(255,255,255,.035);
    }
    .batch-progress[hidden] { display: none; }
    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
      color: #b8b8bd;
      font-size: 11px;
    }
    .progress-meta strong { color: #f1f1f2; font-size: 12px; }
    .progress-track {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
    }
    .progress-bar {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #8d8f96, #f4f4f5);
      box-shadow: 0 0 18px rgba(255,255,255,.2);
      transition: width .35s ease;
    }
    .download-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-top: 16px;
      padding: 16px 17px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 17px;
      background: rgba(255,255,255,.055);
    }
    .download-card[hidden] { display: none; }
    .download-summary strong { display: block; margin-bottom: 4px; color: #dfffee; font-size: 13px; }
    .download-summary small { color: #8faaa0; font-size: 11px; line-height: 1.5; }
    .download-link {
      flex: none;
      padding: 10px 14px;
      color: #090909;
      border-radius: 12px;
      background: #f1f1f2;
      font-size: 12px;
      font-weight: 750;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
    }
    .batch-errors {
      margin: 12px 2px 0;
      color: #d69b98;
      font-size: 11px;
      line-height: 1.7;
    }
    .field-card {
      margin-top: 14px;
      padding: 16px 17px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 17px;
      background: rgba(255,255,255,.04);
    }
    .field-card[hidden] { display: none; }
    .field-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 11px;
    }
    .field-card-title strong { display: block; margin-bottom: 4px; font-size: 13px; }
    .field-card-title small { color: var(--muted); font-size: 11px; }
    .copy-button {
      width: auto;
      min-width: 116px;
      height: 38px;
      padding: 0 14px;
      color: #e3e3e5;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 11px;
      background: rgba(255,255,255,.08);
      box-shadow: none;
      font-size: 11px;
    }
    .copy-button::after { content: ""; }
    .copy-button:hover { background: rgba(255,255,255,.13); box-shadow: none; }
    .field-output {
      width: 100%;
      min-height: 116px;
      resize: vertical;
      padding: 12px 14px;
      color: #e0e0e2;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      background: rgba(4,5,8,.55);
      outline: none;
      font: 11px/1.75 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre;
    }
    .distribution-overview {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .overview-metric {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255,255,255,.035);
    }
    .overview-metric small {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 10px;
    }
    .overview-metric strong { font-size: 20px; letter-spacing: -.03em; }
    .business-grid { display: grid; gap: 12px; }
    .business-card {
      display: grid;
      grid-template-columns: minmax(150px, 1.4fr) repeat(3, minmax(92px, .7fr)) auto;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 17px;
      background: rgba(255,255,255,.04);
    }
    .business-name strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }
    .business-name small { color: var(--muted); font-size: 10px; }
    .business-metric span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 10px;
    }
    .business-metric strong { font-size: 17px; }
    .business-download {
      width: auto;
      min-width: 104px;
      height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      font-size: 11px;
    }
    .business-download::after { content: " ↓"; }
    .business-download:disabled { cursor: not-allowed; }
    .status.busy::before {
      content: "";
      display: inline-block;
      width: 11px;
      height: 11px;
      margin-right: 8px;
      border: 1.5px solid rgba(255,255,255,.18);
      border-top-color: var(--blue);
      border-radius: 50%;
      vertical-align: -2px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin: 78px 2px 20px;
    }
    h2 { margin: 0; font-size: clamp(25px, 4vw, 34px); line-height: 1.1; letter-spacing: -.045em; }
    #count {
      padding: 7px 11px;
      color: #a1a2aa;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.035);
      font-size: 11px;
    }
    .empty {
      padding: 72px 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line-bright);
      border-radius: 24px;
      background: rgba(255,255,255,.025);
    }
    .result {
      position: relative;
      margin-bottom: 22px;
      padding: 24px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: linear-gradient(145deg, rgba(26,28,35,.72), rgba(12,14,18,.68));
      box-shadow: 0 22px 70px rgba(0,0,0,.22), inset 0 1px rgba(255,255,255,.04);
      backdrop-filter: blur(18px);
    }
    .result::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -100px;
      top: -120px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      filter: blur(35px);
    }
    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }
    .result h3 { margin: 0 0 7px; font-size: 18px; font-weight: 620; letter-spacing: -.025em; }
    .meta { color: #777984; font-size: 11px; }
    .badge {
      position: relative;
      padding: 7px 11px;
      color: #c9c9cc;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(255,255,255,.055);
      font-size: 11px;
      white-space: nowrap;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }
    .photo {
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      background: rgba(255,255,255,.035);
      text-decoration: none;
      box-shadow: 0 12px 32px rgba(0,0,0,.2);
      transition: transform .3s cubic-bezier(.2,.8,.2,1), border-color .3s, background .3s;
    }
    .photo:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.055);
    }
    .photo img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #111318;
      transition: transform .5s cubic-bezier(.2,.8,.2,1), filter .3s;
    }
    .photo:hover img { transform: scale(1.025); filter: saturate(1.08); }
    .photo span {
      display: block;
      min-width: 0;
      padding: 12px 13px 13px;
      color: #b9bac1;
      font-size: 10px;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    @media (max-width: 700px) {
      .shell { width: min(100% - 24px, 1180px); }
      .topbar { height: 64px; }
      .panel { margin-top: 32px; padding: 20px; border-radius: 22px; }
      .panel-top { margin-bottom: 16px; }
      .input-row { grid-template-columns: 1fr; }
      button { width: 100%; }
      .upload-zone { grid-template-columns: auto 1fr; }
      .file-name { grid-column: 1 / -1; max-width: 100%; }
      .batch-actions { display: block; }
      .batch-actions button { margin-top: 12px; }
      .download-card { align-items: flex-start; flex-direction: column; }
      .field-card-head { align-items: flex-start; flex-direction: column; }
      .copy-button { width: 100%; }
      .distribution-overview { grid-template-columns: 1fr; }
      .business-card { grid-template-columns: 1fr 1fr; }
      .business-name { grid-column: 1 / -1; }
      .business-download { grid-column: 1 / -1; width: 100%; }
      .section-head { margin-top: 58px; }
      .result { padding: 18px; border-radius: 22px; }
      .gallery { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <div class="brand">
        <img class="brand-logo" src="https://www.crbeer.com.hk/733e20a4-524a-4602-b929-ca1b0bc8e936.png" alt="华润雪花啤酒">
      </div>
      <div class="account">
        <span id="user-status" class="privacy">安全连接 · 已认证</span>
        <a class="logout" href="/logout">退出</a>
      </div>
    </nav>

    <section class="panel">
      <div class="mode-switch" aria-label="提取方式">
        <button class="mode-tab active" type="button" data-mode="single">链接提取</button>
        <button class="mode-tab" type="button" data-mode="batch">批量提取</button>
        <button class="mode-tab" type="button" data-mode="distribution">分发处理</button>
      </div>
      <div id="single-panel" class="mode-panel">
      <div class="panel-top">
        <div>
          <p class="panel-title">请输入CRM链接</p>
          <p class="panel-note">支持两种 CRM 拜访链接</p>
        </div>
        <span class="private-chip">仅私有图片</span>
      </div>
      <label for="url">CRM 拜访详情链接</label>
      <div class="input-row">
        <input id="url" type="url" autocomplete="off" placeholder="粘贴 CRM 拜访链接…">
        <button id="extract">提取图片</button>
      </div>
      <div id="status" class="status"></div>
      </div>

      <div id="batch-panel" class="mode-panel" hidden>
        <div class="panel-top">
          <div>
            <p class="panel-title">请上传excel文档</p>
          </div>
        </div>
        <input id="excel-file" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden>
        <label class="upload-zone" for="excel-file" id="upload-zone">
          <span class="upload-icon">+</span>
          <span class="upload-copy">
            <strong>选择或拖入文件</strong>
          </span>
          <span id="file-name" class="file-name">尚未选择文件</span>
        </label>
        <div class="batch-actions">
          <div id="batch-status" class="status">完成后会自动生成可下载的图片压缩包</div>
          <button id="batch-extract" type="button" disabled>批量提取</button>
        </div>
        <div id="batch-progress" class="batch-progress" hidden>
          <div class="progress-meta">
            <strong id="progress-label">准备处理</strong>
            <span id="progress-percent">0%</span>
          </div>
          <div
            id="progress-track"
            class="progress-track"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <span id="progress-bar" class="progress-bar"></span>
          </div>
        </div>
        <div id="download-card" class="download-card" hidden>
          <div class="download-summary">
            <strong id="download-title">压缩包已生成</strong>
            <small id="download-detail"></small>
          </div>
          <a id="download-link" class="download-link" href="#" download>下载压缩包</a>
        </div>
        <div id="field-card" class="field-card" hidden>
          <div class="field-card-head">
            <div class="field-card-title">
              <strong id="field-title">唯一值</strong>
              <small>复制后可直接粘贴到 Excel，自动排列为一列</small>
            </div>
            <button id="copy-fields" class="copy-button" type="button">复制到 Excel</button>
          </div>
          <textarea id="field-output" class="field-output" readonly></textarea>
        </div>
        <div id="batch-errors" class="batch-errors"></div>
      </div>

      <div id="distribution-panel" class="mode-panel" hidden>
        <div class="panel-top">
          <div>
            <p class="panel-title">机器人链接分发处理</p>
            <p class="panel-note">按业务员汇总 field 唯一值并下载全部提取内容</p>
          </div>
          <span class="private-chip">自动刷新</span>
        </div>
        <div class="distribution-overview">
          <div class="overview-metric">
            <small>业务数量</small>
            <strong id="distribution-business-total">0</strong>
          </div>
          <div class="overview-metric">
            <small>field 唯一值</small>
            <strong id="distribution-field-total">0</strong>
          </div>
          <div class="overview-metric">
            <small>分发链接</small>
            <strong id="distribution-link-total">0</strong>
          </div>
        </div>
        <div id="distribution-status" class="status">正在读取分发任务</div>
        <div id="business-grid" class="business-grid">
          <div class="empty">尚无机器人分发记录</div>
        </div>
      </div>
    </section>

    <div id="recent-section">
    <div class="section-head">
      <div>
        <h2>最近提取</h2>
      </div>
      <span id="count"></span>
    </div>
    <section id="results"><div class="empty">尚无可显示的提取记录</div></section>
    </div>
  </main>

  <script>
    const input = document.querySelector("#url");
    const button = document.querySelector("#extract");
    const status = document.querySelector("#status");
    const results = document.querySelector("#results");
    const count = document.querySelector("#count");
    const userStatus = document.querySelector("#user-status");
    const modeTabs = document.querySelectorAll(".mode-tab");
    const singlePanel = document.querySelector("#single-panel");
    const batchPanel = document.querySelector("#batch-panel");
    const distributionPanel = document.querySelector("#distribution-panel");
    const recentSection = document.querySelector("#recent-section");
    const distributionStatus = document.querySelector("#distribution-status");
    const businessGrid = document.querySelector("#business-grid");
    const distributionBusinessTotal = document.querySelector("#distribution-business-total");
    const distributionFieldTotal = document.querySelector("#distribution-field-total");
    const distributionLinkTotal = document.querySelector("#distribution-link-total");
    const excelFile = document.querySelector("#excel-file");
    const uploadZone = document.querySelector("#upload-zone");
    const fileName = document.querySelector("#file-name");
    const batchButton = document.querySelector("#batch-extract");
    const batchStatus = document.querySelector("#batch-status");
    const batchProgress = document.querySelector("#batch-progress");
    const progressLabel = document.querySelector("#progress-label");
    const progressPercent = document.querySelector("#progress-percent");
    const progressTrack = document.querySelector("#progress-track");
    const progressBar = document.querySelector("#progress-bar");
    const downloadCard = document.querySelector("#download-card");
    const downloadTitle = document.querySelector("#download-title");
    const downloadDetail = document.querySelector("#download-detail");
    const downloadLink = document.querySelector("#download-link");
    const fieldCard = document.querySelector("#field-card");
    const fieldTitle = document.querySelector("#field-title");
    const fieldOutput = document.querySelector("#field-output");
    const copyFields = document.querySelector("#copy-fields");
    const batchErrors = document.querySelector("#batch-errors");
    let csrfToken = "";
    let distributionTimer = null;

    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, char => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[char]));

    function render(items) {
      count.textContent = `${items.length} 条记录`;
      if (!items.length) {
        results.innerHTML = '<div class="empty">尚无可显示的提取记录</div>';
        return;
      }
      results.innerHTML = items.map(item => `
        <article class="result">
          <div class="result-top">
            <div>
              <h3>${escapeHtml(item.terminal_name)}</h3>
              <div class="meta">业务员：${escapeHtml(item.partner_name)} · 记录 ${escapeHtml(item.visit_id).slice(0, 12)}</div>
            </div>
            <div class="badge">${item.images.length} 张图片</div>
          </div>
          <div class="gallery">
            ${item.images.map(image => `
              <a class="photo" href="${image.url}" target="_blank" title="打开原图">
                <img src="${image.url}" alt="${escapeHtml(image.display_filename || image.filename)}" loading="lazy">
                <span>${escapeHtml(image.display_filename || image.filename)} · ${(image.size_bytes / 1024).toFixed(1)} KB</span>
              </a>
            `).join("")}
          </div>
        </article>
      `).join("");
    }

    async function loadSession() {
      const response = await fetch("/api/session");
      if (!response.ok) {
        location.href = "/login";
        return;
      }
      const data = await response.json();
      csrfToken = data.csrf_token;
      userStatus.textContent = data.user ? `已登录 · ${data.user}` : "安全连接 · 已认证";
    }

    async function loadResults() {
      try {
        const response = await fetch("/api/results");
        render(await response.json());
      } catch {
        status.textContent = "无法读取本地提取记录";
        status.className = "status error";
      }
    }

    function renderDistributions(data) {
      const totals = data.totals || {};
      const items = data.items || [];
      distributionBusinessTotal.textContent = totals.business_count || 0;
      distributionFieldTotal.textContent = totals.quantity || 0;
      distributionLinkTotal.textContent = totals.distributed_count || 0;
      distributionStatus.textContent = `待下载 ${totals.pending_download_count || 0} 个 field 唯一值`;
      distributionStatus.className = "status";
      if (!items.length) {
        businessGrid.innerHTML = '<div class="empty">尚无机器人分发记录</div>';
        return;
      }
      businessGrid.innerHTML = items.map(item => {
        const running = Number(item.queued_count || 0) + Number(item.processing_count || 0);
        const detail = [
          running ? `处理中 ${running}` : "",
          item.failed_count ? `失败 ${item.failed_count}` : "",
          item.image_count ? `${item.image_count} 张图片` : ""
        ].filter(Boolean).join(" · ") || "等待处理";
        const canDownload = item.business !== "待识别" && Number(item.quantity || 0) > 0;
        return `
          <article class="business-card">
            <div class="business-name">
              <strong>${escapeHtml(item.business)}</strong>
              <small>${escapeHtml(detail)}</small>
            </div>
            <div class="business-metric">
              <span>数量</span>
              <strong>${Number(item.quantity || 0)}</strong>
            </div>
            <div class="business-metric">
              <span>分发数量</span>
              <strong>${Number(item.distributed_count || 0)}</strong>
            </div>
            <div class="business-metric">
              <span>待下载数量</span>
              <strong>${Number(item.pending_download_count || 0)}</strong>
            </div>
            <button
              class="business-download"
              type="button"
              data-business="${escapeHtml(item.business)}"
              ${canDownload ? "" : "disabled"}
            >下载全部</button>
          </article>
        `;
      }).join("");
    }

    async function loadDistributions() {
      try {
        const response = await fetch("/api/distributions");
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "无法读取分发任务");
        renderDistributions(data);
      } catch (error) {
        distributionStatus.textContent = error.message;
        distributionStatus.className = "status error";
      }
    }

    async function downloadBusiness(button) {
      const business = button.dataset.business;
      if (!business) return;
      button.disabled = true;
      button.textContent = "打包中…";
      distributionStatus.textContent = `正在打包 ${business} 的全部提取内容`;
      distributionStatus.className = "status busy";
      try {
        const response = await fetch(
          `/api/distributions/${encodeURIComponent(business)}/archive`,
          {
            method: "POST",
            headers: {"X-CSRF-Token": csrfToken}
          }
        );
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "打包失败");
        const link = document.createElement("a");
        link.href = data.archive_url;
        link.download = data.archive_name;
        document.body.appendChild(link);
        link.click();
        link.remove();
        distributionStatus.textContent = `${business}：已打包 ${data.field_count} 个 field 唯一值、${data.image_count} 张图片`;
        distributionStatus.className = "status";
        await loadDistributions();
      } catch (error) {
        distributionStatus.textContent = error.message;
        distributionStatus.className = "status error";
      } finally {
        button.disabled = false;
        button.textContent = "下载全部";
      }
    }

    async function extract() {
      const url = input.value.trim();
      if (!url) {
        status.textContent = "请先粘贴 CRM 拜访详情链接";
        status.className = "status error";
        input.focus();
        return;
      }
      button.disabled = true;
      button.textContent = "提取中…";
      status.textContent = "正在读取拜访信息并下载图片，请稍候";
      status.className = "status busy";
      try {
        const response = await fetch("/api/extract", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRF-Token": csrfToken
          },
          body: JSON.stringify({url})
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "提取失败");
        status.textContent = `完成：已提取 ${data.images.length} 张图片`;
        status.className = "status";
        input.value = "";
        await loadResults();
      } catch (error) {
        status.textContent = error.message;
        status.className = "status error";
      } finally {
        button.disabled = false;
        button.textContent = "提取图片";
      }
    }

    function selectFile(file) {
      const valid = file && file.name.toLowerCase().endsWith(".xlsx");
      if (!valid) {
        excelFile.value = "";
        fileName.textContent = file ? "仅支持 .xlsx 文件" : "尚未选择文件";
        batchStatus.textContent = file ? "请选择有效的 .xlsx 文件" : "完成后会自动生成可下载的图片压缩包";
        batchStatus.className = file ? "status error" : "status";
        batchButton.disabled = true;
        return;
      }
      fileName.textContent = file.name;
      batchStatus.textContent = `已选择 ${(file.size / 1024).toFixed(1)} KB，点击开始批量提取`;
      batchStatus.className = "status";
      batchButton.disabled = false;
      downloadCard.hidden = true;
      fieldCard.hidden = true;
      batchProgress.hidden = true;
      batchErrors.textContent = "";
    }

    function updateBatchProgress(job) {
      const total = Number(job.total || 0);
      const processed = Number(job.processed || 0);
      const percent = total ? Math.round(processed / total * 100) : 0;
      const rowNote = job.current_row ? ` · Excel 第 ${job.current_row} 行` : "";
      progressBar.style.width = `${percent}%`;
      progressPercent.textContent = `${percent}%`;
      progressTrack.setAttribute("aria-valuenow", String(percent));
      progressLabel.textContent = job.status === "queued"
        ? `任务排队中 · 共 ${total} 条`
        : `已处理 ${processed}/${total} 条 · 成功 ${job.succeeded || 0} · 失败 ${job.failed || 0}${rowNote}`;
      batchStatus.textContent = job.status === "queued"
        ? "正在准备批量任务"
        : `正在处理：${processed}/${total} 条，已提取 ${job.image_count || 0} 张图片`;
    }

    async function waitForBatchJob(jobId, initialJob) {
      let job = initialJob;
      while (true) {
        updateBatchProgress(job);
        if (job.status === "completed") return job.result;
        if (job.status === "failed") {
          throw new Error(job.error || "批量提取失败");
        }
        await new Promise(resolve => setTimeout(resolve, 650));
        const response = await fetch(`/api/batch-extract/${encodeURIComponent(jobId)}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "无法读取处理进度");
        job = data;
      }
    }

    async function batchExtract() {
      const file = excelFile.files[0];
      if (!file) return;
      batchButton.disabled = true;
      batchButton.textContent = "处理中…";
      batchStatus.textContent = "正在逐条识别链接并提取图片，数量较多时请耐心等待";
      batchStatus.className = "status busy";
      downloadCard.hidden = true;
      fieldCard.hidden = true;
      batchProgress.hidden = false;
      progressBar.style.width = "0%";
      progressPercent.textContent = "0%";
      progressTrack.setAttribute("aria-valuenow", "0");
      progressLabel.textContent = "正在读取 Excel";
      batchErrors.textContent = "";
      try {
        const form = new FormData();
        form.append("file", file);
        const response = await fetch("/api/batch-extract", {
          method: "POST",
          headers: {"X-CSRF-Token": csrfToken},
          body: form
        });
        const started = await response.json();
        if (!response.ok) throw new Error(started.error || "批量提取失败");
        const data = await waitForBatchJob(started.job_id, started);
        const duplicateNote = data.duplicate_count
          ? `，已跳过 ${data.duplicate_count} 条重复链接`
          : "";
        updateBatchProgress({
          status: "completed",
          processed: data.total,
          total: data.total,
          succeeded: data.succeeded,
          failed: data.failed,
          image_count: data.image_count
        });
        batchStatus.textContent = `完成：${data.succeeded}/${data.total} 条成功，共提取 ${data.image_count} 张图片${duplicateNote}`;
        batchStatus.className = "status";
        downloadTitle.textContent = data.archive_name;
        downloadDetail.textContent = `${data.image_count} 张图片 · ${data.failed} 条失败`;
        downloadLink.href = data.archive_url;
        downloadLink.download = data.archive_name;
        downloadCard.hidden = false;
        if (data.field_rows.length) {
          fieldTitle.textContent = `唯一值 · ${data.field_rows.length} 个`;
          fieldOutput.value = data.field_rows
            .map(item => item.field)
            .join("\n");
          fieldCard.hidden = false;
        }
        batchErrors.innerHTML = data.errors.length
          ? `未成功：${data.errors.map(item => `第 ${item.row} 行（${escapeHtml(item.error)}）`).join("；")}`
          : "";
        await loadResults();
      } catch (error) {
        batchStatus.textContent = error.message;
        batchStatus.className = "status error";
        progressLabel.textContent = "处理已停止";
      } finally {
        batchButton.disabled = false;
        batchButton.textContent = "批量提取";
      }
    }

    modeTabs.forEach(tab => tab.addEventListener("click", () => {
      const mode = tab.dataset.mode;
      modeTabs.forEach(item => item.classList.toggle("active", item === tab));
      singlePanel.hidden = mode !== "single";
      batchPanel.hidden = mode !== "batch";
      distributionPanel.hidden = mode !== "distribution";
      recentSection.hidden = mode === "distribution";
      if (distributionTimer) {
        clearInterval(distributionTimer);
        distributionTimer = null;
      }
      if (mode === "distribution") {
        loadDistributions();
        distributionTimer = setInterval(loadDistributions, 3000);
      }
    }));
    businessGrid.addEventListener("click", event => {
      const target = event.target.closest(".business-download");
      if (target && !target.disabled) downloadBusiness(target);
    });
    excelFile.addEventListener("change", () => selectFile(excelFile.files[0]));
    ["dragenter", "dragover"].forEach(name => uploadZone.addEventListener(name, event => {
      event.preventDefault();
      uploadZone.classList.add("dragging");
    }));
    ["dragleave", "drop"].forEach(name => uploadZone.addEventListener(name, event => {
      event.preventDefault();
      uploadZone.classList.remove("dragging");
    }));
    uploadZone.addEventListener("drop", event => {
      const file = event.dataTransfer.files[0];
      if (!file) return;
      const transfer = new DataTransfer();
      transfer.items.add(file);
      excelFile.files = transfer.files;
      selectFile(file);
    });
    copyFields.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(fieldOutput.value);
      } catch {
        fieldOutput.select();
        document.execCommand("copy");
      }
      copyFields.textContent = "已复制";
      setTimeout(() => { copyFields.textContent = "复制到 Excel"; }, 1600);
    });
    batchButton.addEventListener("click", batchExtract);
    button.addEventListener("click", extract);
    input.addEventListener("keydown", event => {
      if (event.key === "Enter") extract();
    });
    (async () => {
      await loadSession();
      await loadResults();
    })();
  </script>
</body>
</html>
