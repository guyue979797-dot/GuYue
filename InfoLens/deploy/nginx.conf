map $http_x_forwarded_for $infolens_forwarded_for {
    default $http_x_forwarded_for;
    "" $remote_addr;
}

map $http_x_forwarded_proto $infolens_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 4m;
    sendfile on;
    tcp_nopush on;

    location ^~ /_protected_media/ {
        internal;
        alias /data/output/;
        etag on;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $infolens_forwarded_for;
        proxy_set_header X-Forwarded-Proto $infolens_forwarded_proto;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
